            - src: "/images/docker.svg"
              url: "https://www.docker.com/"
              tooltip: "Docker"
            - src: "/images/terraform.svg"
              url: "https://developer.hashicorp.com/terraform"
              tooltip: "Terraform"

    - company: "Waycool Foods"
      companyUrl: "https://waycool.in"
      jobs:
        - name: "DevOps Engineer"
          date: "Jan 2022 - July 2023"
          content: |
            I worked as a devops engineer at Waycool foods focusing on web and mobile application operations that help farmers and businesses.
            - Initiated and established the foundational DevOps process, implementing Jenkins, Docker, SonarQube, and Nexus.
            - Migrated applications to multi-cloud platforms (AWS/Azure) utilizing web servers (Nginx, Apache) on Linux instances.
            - Produced a Proof of Concept (POC) for infrastructure deployment using Kubernetes and Terraform.
            - Secured applications by implementing TLS certificates and eliminated vulnerable SFTP deployment practices.
            - Improved time-to-market for key applications (IGrade and SunnyBee).
