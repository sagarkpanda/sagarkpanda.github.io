# Homepage-only container width (see layouts/baseof.html override)
homeContentWidth: "80rem"

# Home page configuration
home:
  recentPostsCount: 3
  contentOrder:
    - author-section
    - about-me
    - projects
    - experience
    - education
    - contact
    - recent-posts

# Post configuration
post:
  showRelated: true
  relatedPostsCount: 3
  license:
    show: false

# Comments (off by default -- enable and fill in a provider when ready)
comments:
  enabled: false
  system: "giscus"

# Analytics (off by default -- fill in an id and flip to true when ready)
analytics:
  enabled: false

katex:
  enabled: true

mermaid:
  enabled: true

gallery:
  enabled: true

lightbox:
  enabled: true

codeblock:
  collapse:
    enabled: true
    defaultState: expanded
    autoCollapseLines: 30
    autoCollapseHeight: 400
    collapsedHeight: 120

readingProgress:
  enabled: true
  showOnHomepage: false

dateFormat:
  full: ":date_full"
  long: ":date_long"
  medium: ":date_medium"
  short: ":date_short"

# Skills pill list (rendered by layouts/_partials/home/skills.html)
# About Me section (rendered by layouts/_partials/home/about-me.html), shown before Skills
aboutMe:
  title: "About Me"
  image: "/images/red_bg_full.webp"
  content: |
    I'm a Senior DevOps Engineer with 7+ years of experience building cloud-native platforms and automating software delivery. My work focuses on creating reliable infrastructure using AWS, Kubernetes, Terraform, GitOps, and CI/CD, enabling development teams to ship software faster and with greater confidence.

    Over the years, I've worked on enterprise-scale microservices migrations, infrastructure automation, deployment optimization, and platform engineering initiatives. I also enjoy documenting what I learn through in-depth tutorials, open-source projects, and practical guides covering cloud infrastructure, Kubernetes, GitHub Actions, observability, and modern DevSecOps practices.

    Whether you're here to explore my projects, read a tutorial, or learn about my professional journey, I hope you find something useful. Here are a few of the tools and technologies I've been working with recently:

