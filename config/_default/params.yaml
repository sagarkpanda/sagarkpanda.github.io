# Projects (rendered by layouts/_partials/home/projects.html)
projects:
  title: "Projects"
  items:
    - name: "OTel Labs Platform"
      link: "https://github.com/sagarkpanda/otel-labs-platform"
      status: "Completed"
      content: |
        GitOps infrastructure and Kubernetes platform for an OpenTelemetry observability demo, provisioned on Amazon EKS. Provisions the cluster with Terraform and deploys ArgoCD, Traefik, and the OpenTelemetry Collector via GitOps, exporting metrics/logs/traces to New Relic and Honeycomb. The companion `otel-labs` repo holds the instrumented demo apps (Node frontend, Python orders API, Go inventory API) this cluster runs.
      icons:
        - src: "/images/aws.svg"
          tooltip: "AWS / EKS"
        - src: "/images/terraform.svg"
          tooltip: "Terraform"
        - src: "/images/argo.svg"
          tooltip: "ArgoCD"
        - src: "/images/kubernetes.svg"
          tooltip: "Kubernetes"

# Experience (rendered by layouts/_partials/home/experience.html)
experience:
  title: "Experience"
  items:
    - company: "Wipro"
      companyUrl: "https://www.wipro.com/"
      jobs:
        - name: "Sr. Software Engineer"
          date: "Nov 2024 - present"
          content: |
            I am currently working as a Sr DevOps engineer at Wipro. I am currently working on a project that generates shelf labels for retail stores for Metro Cash and Carry.
            - Led migration of 30+ microservices to Kubernetes via GitOps workflow with Argo CD, eliminating manual deployments and reducing release risk for a global retail client (Metro AG)
            - Managed Kubernetes resources (Deployments, Services, ConfigMaps, Secrets, Ingress) using Helm and Kustomize across dev, staging, and production environments.
            - Designed GitLab CI pipelines for build, test, deployment, and Semgrep SAST scanning,integrated HashiCorp Vault for secure secrets management across all workloads.
            - Implemented OpenTelemetry-based distributed tracing and observability, enabling proactive incident detection across microservices.

          icons:
            - src: "/images/kubernetes.svg"
              url: "https://kubernetes.io"
              tooltip: "Kubernetes"
            - src: "/images/argo.svg"
              url: "https://argoproj.github.io/"
              tooltip: "Argo CD"
            - src: "/images/gitlab.svg"
              url: "https://about.gitlab.com/"
              tooltip: "GitLab"

    - company: "Valeo"
      companyUrl: "https://www.valeo.com/en/"
      jobs:
        - name: "DevOps Engineer"
          date: "Aug 2023 - Oct 2024"
          content: |
            I worked as a DevOps engineer at Valeo, focusing on automotive software development and deployment.
            - Designed and optimized Jenkins pipelines, reducing build and testing cycle times from days to hours across 10+ concurrent OEM automotive projects.
            - Automated code quality and security scanning with SonarQube and KlocWork; managed AWS infrastructure using Terraform for repeatable provisioning.
            - Implemented monitoring and alerting dashboards with Prometheus and Grafana across Development, QA, and Production environments.
          icons:
            - src: "/images/aws.svg"
              url: "https://aws.amazon.com/"
              tooltip: "AWS"
            - src: "/images/jenkins.svg"
              url: "https://www.jenkins.io/"
