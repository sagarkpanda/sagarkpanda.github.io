<a href="{{ .Destination | safeURL }}" class="lightbox-trigger">
  <img
      src="{{ .Destination | safeURL }}"
      alt="{{ .Text }}"
      {{ with .Title }}title="{{ . }}"{{ end }}
      loading="lazy"
      decoding="async"
  />
</a>
