<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-4 text-center">
            {{ if or .Site.Params.navbar.brandLogo .Site.Params.favicon }}
                <div class="pb-2">
                    <a href="{{ .Site.BaseURL }}" title="{{ .Site.Title }}">
                        <img alt="Footer logo" src="{{ .Site.Params.navbar.brandLogo | default .Site.Params.favicon }}"
                            height="40px" width="40px">
                    </a>
                </div>
            {{ end }}
            &copy; {{ now.Format "2006"}} {{ .Site.Params.copyright }} {{ .Site.Params.terms.copyright | default (i18n "copyright") }}
            <div class="text-secondary" style="white-space: nowrap;">
                Made with
                <a href="https://gohugo.io/" target="_blank"
                    title="Hugo">
                    Hugo
                </a>
                &
                <a href="https://themes.gohugo.io/themes/hugo-profile/" target="_blank"
                    title="Hugo Theme">
                    Hugo Profile
                </a>
            </div>

            <div class="status-indicator mt-2">
            <a href="https://status.sagarpanda.com/"
            target="_blank"
            title="Check System Status"
            class="text-decoration-none d-inline-flex align-items-center">
                <span class="status-dot" style="margin-right: 8px;" aria-hidden="true"></span>
                <span class="status-text">All Systems Operational</span>
            </a>
            </div>

        </div>
    </div>
</div>
