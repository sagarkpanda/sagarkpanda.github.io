  <style>
    /* =========================================
       PART 1: HERO SOCIAL ICONS
       ========================================= */

    #hero a.btn.social-icon {
      border: none !important;
      background: transparent !important;
      box-shadow: none !important;
      margin-top: 1.5rem !important;
      margin-right: 12px !important;
      padding: 0 !important;
      min-width: 0 !important;
      display: inline-flex !important;
      align-items: center !important;
      width: auto !important;
      height: auto !important;
      text-decoration: none !important;
      position: relative !important;
    }

    #hero a.btn.social-icon img {
      width: 24px !important;
      height: 24px !important;
      background: transparent !important;
      filter: invert(36%) sepia(85%) saturate(3000%) hue-rotate(205deg) brightness(90%) contrast(110%) !important;
      transition: transform 0.2s ease-in-out !important;
    }

    .dark #hero a.btn.social-icon img,
    [data-theme="dark"] #hero a.btn.social-icon img {
      filter: brightness(0) invert(1) !important;
    }

    #hero a.btn.social-icon:hover img {
      transform: scale(1.2) !important;
    }

    /* =========================================
       PART 2: BLACK BOX TOOLTIP (NO TRIANGLE)
       ========================================= */

    #hero a.btn.social-icon::after {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background-color: #000000 !important;
      color: #ffffff !important;
      padding: 6px 8px !important;
      border-radius: 4px !important;
      box-shadow: 0px 4px 8px rgba(0,0,0,0.3) !important;
      font-size: 12px;
      line-height: 1 !important;
      font-family: sans-serif !important;
      font-weight: 600;
      white-space: nowrap;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s ease;
      z-index: 999;
      pointer-events: none;
    }

    #hero a[href*="github.com"]::after { content: "GitHub"; }
    #hero a[href*="linkedin.com"]::after { content: "LinkedIn"; }
    #hero a[href*="medium.com"]::after { content: "Medium"; }
    #hero a[href*="mailto:"]::after { content: "Email"; }
    #hero a[href*="t.me"]::after { content: "Telegram"; }
    #hero a[href*="blog"]::after { content: "Blog"; }

    #hero a.btn.social-icon:hover::after {
      opacity: 1;
      visibility: visible;
    }

    #hero a.btn.social-icon:hover {
      color: transparent !important;
    }

    /* =========================================
       GLOBAL CARD ANIMATION
       ========================================= */
    .card {
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.15);
    }

    /* 1. Unify Card Padding */
    #list-page .card-body,
    #recent-posts .card-body {
      padding: 1.25rem !important;
    }

    /* 2. Unify Card Titles (Dark grey, slightly bold) */
    html body #list-page .card .card-body h5.card-title,
    html body #recent-posts .card .card-body h5.card-title {
      font-size: 20px !important;
      line-height: 1.4 !important;
      margin-bottom: 8px !important;
      font-weight: 500 !important;
      color: #222222 !important;
      font-family: sans-serif !important;
    }

    /* 3. Unify Card Descriptions (Blue, readable) */
    html body #list-page .card .card-body .card-text p,
    html body #recent-posts .card .card-body .card-text p {
      font-size: 16px !important;
      line-height: 1.5 !important;
      margin-bottom: 0 !important;
      font-weight: 400 !important;
      color: #0d6efd !important; /* Bootstrap primary blue */
    }

    /* 4. Unify Footer Sizing */
    #list-page .card .card-footer span,
    #recent-posts .card .card-footer span {
      font-size: 13px !important;
      color: #555555 !important;
    }

    #list-page .card .card-footer a.btn,
    #recent-posts .card .card-footer a.btn {
      font-size: 13px !important;
      padding: 4px 12px !important;
    }

    /* =========================================
       PART 4: DARK MODE OVERRIDES
       ========================================= */

    /* 1. Fix Category Text ("Kafka Basics") to be light grey */
    html[data-theme="dark"] body #list-page .card .card-body > div:first-child,
    html[data-theme="dark"] body #recent-posts .card .card-body > div:first-child,
    .dark body #list-page .card .card-body > div:first-child,
    .dark body #recent-posts .card .card-body > div:first-child {
      color: #e2e8f0 !important;
    }

    /* 2. Fix the Main Title to be pure white */
    html[data-theme="dark"] body #list-page .card .card-body h5.card-title,
    html[data-theme="dark"] body #recent-posts .card .card-body h5.card-title,
    .dark body #list-page .card .card-body h5.card-title,
    .dark body #recent-posts .card .card-body h5.card-title {
      color: #ffffff !important;
    }

    /* 3. Fix the Footer Date to be light grey */
    html[data-theme="dark"] body #list-page .card .card-footer span,
    html[data-theme="dark"] body #recent-posts .card .card-footer span,
    .dark body #list-page .card .card-footer span,
    .dark body #recent-posts .card .card-footer span {
      color: #cbd5e1 !important;
    }

    /* 4. Make the Preview Text a brighter blue so it pops on dark cards */
    html[data-theme="dark"] body #list-page .card .card-body .card-text p,
    html[data-theme="dark"] body #recent-posts .card .card-body .card-text p,
    .dark body #list-page .card .card-body .card-text p,
    .dark body #recent-posts .card .card-body .card-text p {
      color: #60a5fa !important;
    }

    /* =========================================
       FOOTER STATUS INDICATOR
       ========================================= */
    .status-dot {
      display: inline-block;
      width: 12px;
      height: 12px;
      background-color: #2ea043; /* Standard GitHub operational green */
      border-radius: 50%;
      /* The pulsing radar effect using box-shadow */
      animation: status-pulse 1s infinite;
    }

    @keyframes status-pulse {
      0% { box-shadow: 0 0 0 0 rgba(46, 160, 67, 0.8); }
      70% { box-shadow: 0 0 0 8px rgba(46, 160, 67, 0); }
      100% { box-shadow: 0 0 0 0 rgba(46, 160, 67, 0); }
    }

    /* Target the text specifically */
    .status-text {
      color: #2ea043 !important; /* Standard GitHub operational green */
      font-weight: 500;
      transition: all 0.2s ease-in-out;
    }

    /* Glow effect on hover */
    .status-indicator a:hover .status-text {
      color: #3fb950 !important; /* Brighter neon green */
      text-shadow: 0 0 8px rgba(63, 185, 80, 0.4);
    }

</style>
