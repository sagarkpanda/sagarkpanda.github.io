/* =========================================
   Part 8: Supabase likes
   ========================================= */

:root {
    --heart-grey: #8899a6;
    --heart-cherry: #D2042D;
}

/* Dark Mode Theme Overrides */
body.dark {
    --heart-grey: #657786;
}

.bluesky-heart-wrapper {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 25px 0;
    position: relative;
    z-index: 10;
}

#like-btn {
    background: none !important;
    border: none !important;
    padding: 0 !important; /* Removed padding to tighten the layout */
    cursor: pointer !important;
    outline: none !important;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    width: 32px;
    height: 32px;
    transition: transform 0.2s ease;
}


#like-btn:hover {
    transform: scale(1.2);
}

.icon-stack {
    position: relative;
    width: 24px;
    height: 24px;
    display: block;
}

.icon-stack svg {
    position: absolute !important;
    top: 50% !important;
    left: 50% !important;
    transform: translate(-50%, -50%) !important;
    width: 24px !important;
    height: 24px !important;
    transition: all 0.2s ease !important;
    pointer-events: none;
}

.heart-outline {
    color: var(--heart-grey) !important;
    opacity: 1 !important;
    z-index: 2;
}

.heart-filled {
    color: var(--heart-cherry) !important;
    opacity: 0 !important;
    transform: translate(-50%, -50%) scale(0) !important;
    z-index: 3;
    filter: drop-shadow(0 0 2px rgba(210, 4, 45, 0.3));
}

/* --- THE EXPLOSION --- */
.particles {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    box-shadow:
        0 -18px 0 0 var(--heart-cherry), 13px -13px 0 0 var(--heart-cherry),
        18px 0 0 0 var(--heart-cherry), 13px 13px 0 0 var(--heart-cherry),
        0 18px 0 0 var(--heart-cherry), -13px 13px 0 0 var(--heart-cherry),
        -18px 0 0 0 var(--heart-cherry), -13px -13px 0 0 var(--heart-cherry);
    transform: translate(-50%, -50%) scale(0);
    opacity: 0;
    pointer-events: none;
    z-index: 1;
}

/* --- ANIMATION TRIGGERS --- */
.liked .heart-outline {
    opacity: 0 !important;
    transform: translate(-50%, -50%) scale(0.5) !important;
}

.liked .heart-filled {
    opacity: 1 !important;
    animation: heart-bounce-svg 0.45s cubic-bezier(0.17, 0.89, 0.32, 1.49) forwards !important;
}

.liked .particles {
    animation: particle-burst 0.45s ease-out forwards;
}

@keyframes heart-bounce-svg {
    0% { transform: translate(-50%, -50%) scale(0); }
    50% { transform: translate(-50%, -50%) scale(1.4); }
    100% { transform: translate(-50%, -50%) scale(1); }
}

@keyframes particle-burst {
    0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
    30% { opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1.8); opacity: 0; }
}

#like-count {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    color: var(--heart-grey);
    font-size: 18px;
    line-height: 1;
}

.liked #like-count {
    color: var(--heart-cherry);
}

/* --- Refined "Micro-Shake" (Subtle & Clean) --- */
.shake-animation {
    animation: micro-shake 0.3s cubic-bezier(.36,.07,.19,.97) both;
}

@keyframes micro-shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-2px); }
    40% { transform: translateX(2px); }
    60% { transform: translateX(-1px); }
    80% { transform: translateX(1px); }
}

/* Optional: Add a 'not-allowed' cursor when already liked */
.liked #like-btn {
    cursor: default !important;
}

<script>
    const SB_URL = 'https://dghpmgmaxkrabkccuprr.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRnaHBtZ21heGtyYWJrY2N1cHJyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMjM2OTMsImV4cCI6MjA4OTg5OTY5M30.jiaAgBQ55EgweW33BUV8uFKssmEPOTxjNQvw4qJ4Lrs';

    async function handleLike() {
        const slug = window.location.pathname;
        const storageKey = 'liked_' + slug;
        const container = document.getElementById('custom-heart-section');
        const btn = document.getElementById('like-btn');
        const countEl = document.getElementById('like-count');

        if (!container || !btn || !countEl) return;

        // --- CASE 1: ALREADY LIKED ---
        // Trigger the "Shake" animation to show it's already done
        if (localStorage.getItem(storageKey)) {
            btn.classList.remove('shake-animation'); // Reset class
            void btn.offsetWidth;                    // Trigger reflow to restart animation
            btn.classList.add('shake-animation');

            // Clean up class after animation (400ms)
            setTimeout(() => btn.classList.remove('shake-animation'), 400);
            return;
        }

        // --- CASE 2: NEW LIKE ---
        // 1. Optimistic UI update (Instant feedback)
        container.classList.add('liked');
        let currentCount = parseInt(countEl.innerText) || 0;
        countEl.innerText = currentCount + 1;

        // 2. Network Request to Supabase
        try {
            const res = await fetch(SB_URL + '/rest/v1/rpc/increment_like', {
                method: 'POST',
                headers: {
                    'apikey': SB_KEY,
                    'Authorization': 'Bearer ' + SB_KEY,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ post_id: slug })
            });

            if (res.ok) {
                localStorage.setItem(storageKey, 'true');
            } else {
                throw new Error("Supabase RPC failed");
            }
        } catch (e) {
            console.error("Like Sync Error:", e);
            // Optional: Revert UI if the server is down
            // container.classList.remove('liked');
            // countEl.innerText = currentCount;
        }
    }

    /**
     * Page Load Initialization
     * Syncs UI state with LocalStorage and fetches fresh count
     */
    document.addEventListener('DOMContentLoaded', function() {
        const slug = window.location.pathname;
        const storageKey = 'liked_' + slug;
        const container = document.getElementById('custom-heart-section');
        const countEl = document.getElementById('like-count');

        if (!container || !countEl) return;

        // Check if user already liked this post previously
        if (localStorage.getItem(storageKey)) {
            container.classList.add('liked');
        }

        // Fetch the current like count from Supabase
        fetch(SB_URL + '/rest/v1/likes?id=eq.' + encodeURIComponent(slug) + '&select=count', {
            headers: {
                'apikey': SB_KEY,
                'Authorization': 'Bearer ' + SB_KEY
            }
        })
        .then(res => res.json())
        .then(data => {
            if (data && data[0]) {
                countEl.innerText = data[0].count;
            }
        })
        .catch(err => console.error("Error loading like count:", err));
    });
</script>
