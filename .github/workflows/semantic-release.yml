name: Semantic Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - README.md
      - .gitignore
      - License
      - .gitattributes
      - '.github/workflows/deploy.yaml'
      - '.github/workflows/nocommit-release.yaml'
      - '.github/workflows/github-release.yaml'

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run semantic-release
        run: npm run release