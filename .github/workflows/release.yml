name: Release

on:
  push:
    branches:
      - main
    paths-ignore:
    - "README.md"
    - "README.MD"
    - ".gitignore"
    - "LICENSE"
    - "License"
    - ".gitattributes"
    - ".github/workflows/deploy.yaml"

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release
